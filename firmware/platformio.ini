[env:heltec_wifi_lora_32_V2]
platform = espressif32
board = heltec_wifi_lora_32_V2
framework = arduino
monitor_speed = 115200

# Board-specific configuration
board_build.f_cpu = 240000000L

# Libraries (add as needed)
lib_deps = 
    # WiFi & Network
    WiFi@latest
    
    # Sensor libraries
    DHT sensor library@latest
    Adafruit Unified Sensor@latest
    
    # HTTP/REST
    HTTPClient@latest
    
    # Firebase (optional, for cloud integration)
    Firebase Arduino Client Library for ESP32@latest
    
    # LoRa (if using LoRa features)
    LoRa@latest

# Build flags
build_flags = 
    -D CORE_DEBUG_LEVEL=1

# Upload settings
upload_speed = 921600
